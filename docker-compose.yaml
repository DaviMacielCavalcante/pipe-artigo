services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=cnpj-cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_NUM_TOKENS=128
    ports:
      - "9042:9042"
      - "7199:7199"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./database/cassandra:/opt/scripts:ro
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongodb/mongodb-community-server:7.0-ubuntu2204
    container_name: mongodb
    environment:
      - MONGO_INITDB_DATABASE=cnpj_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  test-network:
    driver: bridge

volumes:
  cassandra-data:
  mongodb-data:
  spark-worker-1-work:
  spark-worker-2-work: